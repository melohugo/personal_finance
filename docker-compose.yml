services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: personal_finance_app
    volumes:
      - .:/app:z
      - /app/node_modules
    ports:
      - "${PORT:-3000}:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_OPTIONS=--dns-result-order=ipv4first
    networks:
      - finance_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    container_name: personal_finance_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data:z
    networks:
      - finance_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: personal_finance_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - finance_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  finance_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  postgres_data:

services:
  db:
    image: postgres:15-alpine
    container_name: personal_finance_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: personal_finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: personal_finance_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:

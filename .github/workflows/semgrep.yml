name: Semgrep

on:
  pull_request:
    branches: [main]

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep via Docker
        run: docker run --rm -v "$(pwd):/src" semgrep/semgrep semgrep scan --config auto --error
        continue-on-error: true
